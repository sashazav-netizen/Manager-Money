<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manager-Money 2026 Pro v3.0.2</title>

    <meta name="theme-color" content="#070b14">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&family=Assistant:wght@200;400&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        :root {
            --bg: #070b14;
            --glass: rgba(30, 41, 59, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --income: #10b981;
            --expense: #f43f5e;
            --fixed: #f59e0b;
            --accent: #38bdf8;
        }

        * { box-sizing: border-box; font-family: 'Heebo', sans-serif; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
        
        body {
            background: radial-gradient(circle at 50% 0%, #1e293b 0%, #070b14 100%);
            background-attachment: fixed;
            padding: 15px;
        }

        .container { max-width: 500px; margin: 0 auto; padding-bottom: 120px; }

        /* Header Fixes */
        header { display: flex; justify-content: space-between; align-items: center; margin: 10px 0 25px; }
        .brand { display: flex; flex-direction: column; }
        h1 { font-size: 1.6rem; font-weight: 900; margin: 0; line-height: 1; }
        h1 span { color: var(--accent); }
        .version-tag { font-size: 0.65rem; font-weight: 700; opacity: 0.6; margin-top: 4px; letter-spacing: 1px; }
        
        .cloud-status { display: flex; align-items: center; gap: 5px; font-size: 0.6rem; margin-top: 2px; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #64748b; }
        .status-dot.online { background: var(--income); box-shadow: 0 0 8px var(--income); }

        .logo-container { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; background: rgba(56,189,248,0.05); border-radius: 14px; border: 1px solid var(--glass-border); }

        /* Modern Alert Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .modal-overlay.open { display: flex; }
        .alert-box { background: #1e293b; border: 1px solid var(--glass-border); border-radius: 24px; padding: 25px; width: 100%; max-width: 320px; text-align: center; transform: scale(0.9); transition: 0.3s; }
        .modal-overlay.open .alert-box { transform: scale(1); }
        .alert-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .btn-alert { padding: 12px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; }
        .btn-confirm { background: var(--expense); color: white; }
        .btn-cancel { background: rgba(255,255,255,0.1); color: white; }

        /* Input Error Shake */
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .error-shake { animation: shake 0.3s ease-in-out; border-color: var(--expense) !important; }

        /* Bank Card */
        .bank-card {
            background: linear-gradient(135deg, rgba(56,189,248,0.15), rgba(16,185,129,0.1));
            border: 1px solid var(--glass-border); border-radius: 22px;
            padding: 22px; margin-bottom: 15px; text-align: center;
            backdrop-filter: blur(12px); position: relative;
        }
        .bank-card b { font-size: 2rem; display: block; margin-top: 5px; transition: 0.3s; }
        .privacy-toggle { position: absolute; top: 12px; left: 12px; background: none; border: none; color: var(--text-dim); font-size: 1.2rem; cursor: pointer; }
        .blur-mode b, .blur-mode .item-price { filter: blur(10px); }

        /* Stats & Controls */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: var(--glass); border: 1px solid var(--glass-border); padding: 12px; border-radius: 16px; display: flex; align-items: center; gap: 10px; }
        
        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: var(--glass); padding: 8px 15px; border-radius: 30px; border: 1px solid var(--glass-border); }
        .pill-box { display: flex; background: rgba(0,0,0,0.2); padding: 3px; border-radius: 20px; gap: 2px; }
        .pill { padding: 6px 14px; border-radius: 15px; font-size: 0.75rem; font-weight: 700; cursor: pointer; color: var(--text-dim); }
        .pill.active { background: var(--accent); color: var(--bg); }

        /* List Items */
        .item { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 18px; padding: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-right: 5px solid transparent; }
        .item.income { border-right-color: var(--income); }
        .item.expense { border-right-color: var(--expense); }
        .item.fixed { border-right-color: var(--fixed); }
        .item.is-done { opacity: 0.4; filter: grayscale(0.6); }
        .check { width: 28px; height: 28px; border-radius: 8px; border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .check.checked { background: var(--accent); color: var(--bg); font-weight: 900; }
        
        .item-price { font-weight: 900; font-size: 1rem; }
        .btn-del { background: none; border: none; color: var(--expense); opacity: 0.4; cursor: pointer; font-size: 1.2rem; padding: 5px; }

        /* FAB & Sheet */
        .fab { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 65px; height: 65px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(56,189,248,0.4); border: none; color: var(--bg); font-size: 2.2rem; z-index: 100; cursor: pointer; }
        .sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: #1e293b; border-radius: 30px 30px 0 0; z-index: 1000; padding: 30px 20px; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .sheet.open { bottom: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: none; z-index: 999; backdrop-filter: blur(5px); }
        .overlay.open { display: block; }

        input, select { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border); border-radius: 14px; padding: 15px; color: white; margin-bottom: 15px; font-size: 1rem; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); background: rgba(255,255,255,0.08); }
        .btn-save { width: 100%; padding: 18px; border-radius: 14px; border: none; background: var(--accent); color: var(--bg); font-weight: 900; font-size: 1.2rem; cursor: pointer; }

        /* Footer & Actions */
        .bottom-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 25px; }
        .act-btn { background: var(--glass); border: 1px solid var(--glass-border); padding: 12px 5px; border-radius: 12px; font-size: 0.7rem; color: var(--text-dim); text-align: center; cursor: pointer; }

        footer { text-align: center; padding: 40px 20px 20px; color: var(--text-dim); font-size: 0.75rem; font-family: 'Assistant', sans-serif; letter-spacing: 0.5px; opacity: 0.7; }

        #toast { position: fixed; top: -60px; left: 50%; transform: translateX(-50%); padding: 12px 25px; border-radius: 15px; background: var(--accent); color: var(--bg); font-weight: 800; z-index: 3000; transition: 0.5s; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        #toast.show { top: 30px; }
        #toast.error { background: var(--expense); color: white; }
    </style>
</head>
<body id="root">

<div id="toast"></div>

<div class="modal-overlay" id="deleteModal">
    <div class="alert-box">
        <div style="font-size: 2.5rem; margin-bottom: 10px;">⚠️</div>
        <h3 style="margin:0; font-weight:900;">למחוק את הפעולה?</h3>
        <p style="color:var(--text-dim); font-size:0.85rem;">לא ניתן יהיה לשחזר את הנתונים לאחר המחיקה.</p>
        <div class="alert-btns">
            <button class="btn-alert btn-confirm" onclick="confirmDelete()">כן, מחק</button>
            <button class="btn-alert btn-cancel" onclick="closeDeleteModal()">ביטול</button>
        </div>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closeSheet()"></div>

<button class="fab" onclick="openSheet()">+</button>

<div class="sheet" id="sheet">
    <div style="width:45px; height:5px; background:rgba(255,255,255,0.1); margin: -15px auto 25px; border-radius:10px;"></div>
    <h2 id="sheetTitle" style="margin-top:0; text-align:center; font-weight:900;">פעולה חדשה</h2>
    <input type="text" id="desc" placeholder="תיאור הפעולה">
    <div style="display:grid; grid-template-columns: 1fr 1.1fr; gap:12px;">
        <input type="number" id="amount" placeholder="סכום" inputmode="decimal">
        <select id="type">
            <option value="expense">💸 הוצאה</option>
            <option value="income">💰 הכנסה</option>
            <option value="fixed">📅 קבוע</option>
        </select>
    </div>
    <input type="date" id="date">
    <button class="btn-save" onclick="saveEntry()">שמור נתונים</button>
    <button onclick="closeSheet()" style="width:100%; background:none; border:none; color:var(--text-dim); margin-top:15px; font-weight:700;">סגור חלון</button>
</div>

<div class="container">
    <header>
        <div class="brand">
            <h1>Manager<span>Money</span></h1>
            <div class="version-tag">v3.0.2 PRO</div>
            <div class="cloud-status">
                <div class="status-dot" id="cloudDot"></div>
                <span id="cloudText">מערכת בענן</span>
            </div>
        </div>
        <div class="logo-container">
            <svg viewBox="0 0 24 24" width="30" height="30">
                <path class="shield-base" d="M12 2L4 5v6.09c0 5.05 3.41 9.76 8 10.91 4.59-1.15 8-5.86 8-10.91V5l-8-3z" fill="rgba(56,189,248,0.1)" stroke="var(--accent)" stroke-width="2"/>
                <rect class="data-bar" x="7" y="14" width="2" height="4" rx="1" fill="var(--income)"/>
                <rect class="data-bar" x="11" y="11" width="2" height="7" rx="1" fill="var(--income)" style="opacity:0.7"/>
                <rect class="data-bar" x="15" y="8" width="2" height="10" rx="1" fill="var(--income)" style="opacity:0.4"/>
            </svg>
        </div>
    </header>

    <div class="bank-card">
        <button class="privacy-toggle" onclick="togglePrivacy()">👁️</button>
        <span style="font-size:0.85rem; color:var(--text-dim)">יתרת עו"ש זמינה</span>
        <b id="bankBal">₪0</b>
    </div>

    <div class="stats-grid">
        <div class="stat-box">
            <div style="color:var(--income); font-weight:900;">↑</div>
            <div><span>הכנסות</span><b id="statInc">₪0</b></div>
        </div>
        <div class="stat-box">
            <div style="color:var(--expense); font-weight:900;">↓</div>
            <div><span>הוצאות</span><b id="statExp">₪0</b></div>
        </div>
    </div>

    <div class="controls">
        <div style="display:flex; align-items:center; gap:12px;">
            <span onclick="changeMonth(-1)" style="cursor:pointer; font-size:1.2rem;">◀</span>
            <b id="monthLabel" style="font-size:1rem; min-width:80px; text-align:center;"></b>
            <span onclick="changeMonth(1)" style="cursor:pointer; font-size:1.2rem;">▶</span>
        </div>
        <div class="pill-box">
            <div class="pill active" id="f-all" onclick="setFilter('all')">הכל</div>
            <div class="pill" id="f-open" onclick="setFilter('open')">פתוח</div>
        </div>
    </div>

    <div id="list"></div>

    <div class="bottom-actions">
        <div class="act-btn" onclick="importFixedEntries()">📅 טען קבועות</div>
        <div class="act-btn" onclick="syncToCloud()">☁️ סנכרון</div>
        <div class="act-btn" onclick="mergeData()">🧬 מיזוג</div>
        <div class="act-btn" onclick="exportCSV()">📊 אקסל</div>
        <div class="act-btn" onclick="exportJSON()">💾 גיבוי</div>
        <div class="act-btn" style="color:var(--expense)" onclick="clearLocal()">🗑 נקה</div>
    </div>

    <footer>
        All rights reserved to Alexander Zabodiskar 2026 ©
    </footer>
</div>

<script>
// --- Firebase Setup ---
const firebaseConfig = {
    apiKey: "AIzaSyAZ2-EJjvIbDvtKLwKg3LObkIAs8sNhyjU",
    authDomain: "managermoney-49d0e.firebaseapp.com",
    projectId: "managermoney-49d0e",
    databaseURL: "https://managermoney-49d0e-default-rtdb.europe-west1.firebasedatabase.app",
    storageBucket: "managermoney-49d0e.firebasestorage.app",
    messagingSenderId: "289678997235",
    appId: "1:289678997235:web:0a58a5a7a36d38e1152986"
};
firebase.initializeApp(firebaseConfig);
let dbRef;

const STORAGE_KEY = 'budget_pro_302';
let entries = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
let viewDate = new Date();
let currentFilter = 'all', editId = null, privacy = false, pendingDeleteId = null;
const MONTHS = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

function showToast(msg, isError = false) { 
    const t = document.getElementById('toast'); 
    t.textContent = msg; 
    t.className = isError ? 'show error' : 'show';
    setTimeout(()=>t.classList.remove('show'), 3000); 
}

function updateCloudStatus(isOnline) {
    const dot = document.getElementById('cloudDot');
    const txt = document.getElementById('cloudText');
    if(isOnline) {
        dot.classList.add('online');
        txt.textContent = 'ענן מסונכרן';
    } else {
        dot.classList.remove('online');
        txt.textContent = 'מצב לא מקוון';
    }
}

function openSheet(id = null) {
    // Reset errors
    document.querySelectorAll('.error-shake').forEach(el => el.classList.remove('error-shake'));
    if(id) {
        const e = entries.find(x => x.id === id);
        document.getElementById('desc').value = e.desc;
        document.getElementById('amount').value = e.amount;
        document.getElementById('type').value = e.type;
        document.getElementById('date').value = e.date;
        editId = id; document.getElementById('sheetTitle').textContent = "עריכת פעולה";
    } else {
        editId = null;
        document.getElementById('desc').value = '';
        document.getElementById('amount').value = '';
        document.getElementById('date').value = new Date().toISOString().split('T')[0];
        document.getElementById('sheetTitle').textContent = "פעולה חדשה";
    }
    document.getElementById('sheet').classList.add('open');
    document.getElementById('overlay').classList.add('open');
}

function closeSheet() { document.getElementById('sheet').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }
function togglePrivacy() { privacy = !privacy; document.getElementById('root').classList.toggle('blur-mode', privacy); }

function setFilter(f) { 
    currentFilter = f; 
    document.getElementById('f-all').classList.toggle('active', f==='all');
    document.getElementById('f-open').classList.toggle('active', f==='open');
    render(); 
}

function render() {
    const m = viewDate.getMonth(), y = viewDate.getFullYear();
    document.getElementById('monthLabel').textContent = MONTHS[m] + ' ' + y;
    
    let filtered = entries.filter(e => {
        const d = new Date(e.date);
        return d.getMonth() === m && d.getFullYear() === y;
    });

    let inc = 0, exp = 0, realPaid = 0, realInc = 0;
    filtered.forEach(e => {
        if(e.type === 'income') { inc += e.amount; if(e.done) realInc += e.amount; }
        else { exp += e.amount; if(e.done) realPaid += e.amount; }
    });

    if(currentFilter === 'open') filtered = filtered.filter(e => !e.done);
    const listEl = document.getElementById('list');
    listEl.innerHTML = '';

    filtered.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(e => {
        listEl.innerHTML += `
            <div class="item ${e.type} ${e.done?'is-done':''}">
                <div style="display:flex; align-items:center; gap:12px;">
                    <div class="check ${e.done?'checked':''}" onclick="toggleDone(${e.id})">${e.done?'✓':''}</div>
                    <div onclick="openSheet(${e.id})" style="cursor:pointer">
                        <b style="font-size:0.95rem; display:block;">${e.desc}</b>
                        <span style="font-size:0.65rem; color:var(--text-dim)">${new Date(e.date).toLocaleDateString('he-IL')}</span>
                    </div>
                </div>
                <div style="display:flex; align-items:center; gap:12px;">
                    <b class="item-price" style="color:var(--${e.type})">₪${e.amount.toLocaleString()}</b>
                    <button class="btn-del" onclick="askDelete(${e.id})">🗑</button>
                </div>
            </div>`;
    });

    document.getElementById('statInc').textContent = '₪' + inc.toLocaleString();
    document.getElementById('statExp').textContent = '₪' + exp.toLocaleString();
    const bank = realInc - realPaid;
    document.getElementById('bankBal').textContent = (bank < 0 ? '-' : '') + '₪' + Math.abs(bank).toLocaleString();
    document.getElementById('bankBal').style.color = bank >= 0 ? 'var(--income)' : 'var(--expense)';
}

function saveEntry() {
    const descEl = document.getElementById('desc'), amtEl = document.getElementById('amount');
    const d = descEl.value.trim(), a = parseFloat(amtEl.value);
    const t = document.getElementById('type').value, dt = document.getElementById('date').value;

    let hasError = false;
    if(!d) { descEl.classList.add('error-shake'); hasError = true; }
    if(isNaN(a) || a <= 0) { amtEl.classList.add('error-shake'); hasError = true; }
    if(hasError) { showToast("חובה למלא תיאור וסכום", true); return; }

    if(editId) {
        const i = entries.findIndex(e => e.id === editId);
        entries[i] = { ...entries[i], desc: d, amount: a, type: t, date: dt };
        if(dbRef) dbRef.child(editId).set(entries[i]);
    } else {
        const newE = { id: Date.now(), desc: d, amount: a, type: t, date: dt, done: (t==='income') };
        entries.push(newE);
        if(dbRef) dbRef.child(newE.id).set(newE);
    }
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    render(); closeSheet(); showToast("נשמר בהצלחה ✨");
}

function askDelete(id) { pendingDeleteId = id; document.getElementById('deleteModal').classList.add('open'); }
function closeDeleteModal() { document.getElementById('deleteModal').classList.remove('open'); pendingDeleteId = null; }
function confirmDelete() {
    if(!pendingDeleteId) return;
    entries = entries.filter(e => e.id !== pendingDeleteId);
    if(dbRef) dbRef.child(pendingDeleteId).remove();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    render(); closeDeleteModal(); showToast("הפעולה נמחקה");
}

function toggleDone(id) {
    const i = entries.findIndex(e => e.id === id);
    if(i > -1) {
        entries[i].done = !entries[i].done;
        if(dbRef) dbRef.child(id).update({ done: entries[i].done });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
        render();
    }
}

function changeMonth(n) { viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() + n, 1); render(); }

function importFixedEntries() {
    const m = viewDate.getMonth(), y = viewDate.getFullYear();
    const allFixed = entries.filter(e => e.type === 'fixed');
    const existing = entries.filter(e => {
        const d = new Date(e.date);
        return d.getMonth() === m && d.getFullYear() === y && e.type === 'fixed';
    }).map(e => e.desc);
    
    let count = 0;
    allFixed.forEach(f => {
        if(!existing.includes(f.desc)) {
            const newId = Date.now() + Math.floor(Math.random()*100);
            const newE = { id: newId, desc: f.desc, amount: f.amount, type: 'fixed', date: new Date(y, m, 2).toISOString().split('T')[0], done: false };
            entries.push(newE); if(dbRef) dbRef.child(newId).set(newE);
            count++;
        }
    });
    if(count > 0) { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); render(); showToast(`נוספו ${count} קבועות`); }
}

function syncToCloud() {
    if(!dbRef) return;
    const data = {}; entries.forEach(e => data[e.id] = e);
    dbRef.set(data).then(() => { showToast("ענן עודכן בהצלחה"); updateCloudStatus(true); });
}

function mergeData() {
    if(!dbRef) return;
    dbRef.once('value').then(snap => {
        const cloud = snap.val() ? Object.values(snap.val()) : [];
        const localIds = entries.map(e => e.id);
        cloud.forEach(c => { if(!localIds.includes(c.id)) entries.push(c); });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
        render(); showToast("נתונים מוזגו בהצלחה");
    });
}

function exportCSV() {
    let csv = '\uFEFFתאריך,תיאור,סוג,סכום,שולם\n';
    entries.forEach(e => csv += `${e.date},${e.desc},${e.type},${e.amount},${e.done?'V':''}\n`);
    const blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'money_report.csv'; a.click();
}

function exportJSON() {
    const blob = new Blob([JSON.stringify(entries)], {type:'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'money_backup.json'; a.click();
}

function clearLocal() { if(confirm('לנקות את כל הנתונים המקומיים?')) { entries = []; localStorage.removeItem(STORAGE_KEY); render(); } }

firebase.auth().signInAnonymously().then(cred => {
    dbRef = firebase.database().ref(`users/${cred.user.uid}/entries`);
    updateCloudStatus(true);
    dbRef.once('value').then(snap => {
        if(snap.val()) {
            entries = Object.values(snap.val());
            localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
            render();
        }
    });
}).catch(() => updateCloudStatus(false));

render();
</script>
</body>
</html>
