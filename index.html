<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manager-Money | אלכסנדר 2026</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #070b14;
            --glass: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --income: #22c55e;
            --expense: #ef4444;
            --fixed: #f59e0b;
            --balance: #38bdf8;
            --accent: #38bdf8;
            --cloud: #10b981;
        }

        html, body { max-width: 100%; overflow-x: hidden; margin: 0; padding: 0; background: var(--bg); }
        * { box-sizing: border-box; font-family: 'Heebo', sans-serif; }

        body {
            background: radial-gradient(circle at top right, #1e293b, #070b14);
            background-attachment: fixed;
            color: var(--text); padding: 15px; direction: rtl; min-height: 100vh;
        }

        .container { max-width: 600px; margin: 0 auto; padding-bottom: 40px; }

        /* ===== HEADER ===== */
        header { display: flex; align-items: center; justify-content: space-between; margin: 20px 0; padding: 0 10px; }
        .header-right { display: flex; align-items: center; gap: 12px; }

        .logo-container {
            width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            background: rgba(56,189,248,0.05); border-radius: 12px;
            box-shadow: 0 0 16px rgba(56,189,248,0.3); border: 1px solid var(--glass-border);
        }
        
        .shield-base { fill: rgba(56,189,248,0.1); stroke: var(--accent); stroke-width: 1.5; animation: shieldPulse 3s infinite ease-in-out; transform-origin: center; }
        .data-bar { fill: var(--income); animation: barFlow 2s infinite ease-in-out; transform-origin: center bottom; }
        @keyframes shieldPulse { 0%,100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } }
        @keyframes barFlow { 0%,100% { transform: scaleY(0.7); opacity: 0.5; } 50% { transform: scaleY(1); opacity: 1; } }

        h1 { font-size: 1.6rem; font-weight: 900; margin: 0; letter-spacing: -1px; line-height: 1; }
        h1 span { color: var(--accent); }

        .status-bar { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
        .version-badge { background: rgba(56,189,248,0.15); border: 1px solid rgba(56,189,248,0.3); color: var(--accent); font-size: 0.6rem; font-weight: 700; padding: 1px 7px; border-radius: 20px; }
        .cloud-badge { display: flex; align-items: center; gap: 4px; color: var(--cloud); font-size: 0.65rem; font-weight: 700; }
        .cloud-badge svg { width: 12px; height: 12px; fill: var(--cloud); }

        .user-avatar { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, rgba(56,189,248,0.2), rgba(30,41,59,0.8)); border: 1px solid var(--accent); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(56,189,248,0.3); }
        .user-avatar svg { width: 22px; height: 22px; fill: var(--accent); }

        /* ===== NAV & SUMMARY ===== */
        .month-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: var(--glass); padding: 8px 15px; border-radius: 50px; border: 1px solid var(--glass-border); }
        .nav-btn { background: var(--accent); color: var(--bg); border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-weight: bold; }
        .load-fixed-btn { background: rgba(245,158,11,0.15); color: var(--fixed); border: 1px solid var(--fixed); padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; cursor: pointer; font-weight: 700; margin-top: 2px; }

        .summary-mini { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
        .mini-card { background: var(--glass); backdrop-filter: blur(12px); padding: 10px 2px; border-radius: 12px; text-align: center; border: 1px solid var(--glass-border); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 85px; }
        .mini-card span { display: block; font-size: 0.65rem; color: var(--text-dim); margin-bottom: 2px; }
        .mini-card b { font-size: 0.8rem; white-space: nowrap; font-weight: 900; }

        /* ===== CHART & PROGRESS ===== */
        .chart-section { background: var(--glass); padding: 12px; border-radius: 18px; margin-bottom: 20px; border: 1px solid var(--glass-border); display: flex; flex-direction: column; align-items: center; }
        .chart-container { height: 100px; width: 100px; position: relative; }
        .budget-progress-container { background: var(--glass); padding: 12px; border-radius: 15px; margin-bottom: 15px; border: 1px solid var(--glass-border); }
        .progress-label { display: flex; justify-content: space-between; font-size: 0.75rem; margin-bottom: 6px; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: var(--accent); transition: width 0.6s ease; }

        /* ===== FORM ===== */
        .form-card { background: var(--glass); padding: 16px; border-radius: 20px; margin-bottom: 20px; border: 1px solid var(--glass-border); }
        .form-card.edit-mode { border-color: var(--fixed); background: rgba(245,158,11,0.08); }
        .input-row-top { display: grid; grid-template-columns: 1.2fr 1fr 1.2fr; gap: 10px; margin-bottom: 10px; }
        .input-row-bottom { display: grid; grid-template-columns: 1fr 2fr; gap: 10px; }
        input, select, .btn-main { height: 55px; border-radius: 14px; border: 1px solid var(--glass-border); background: rgba(15,23,42,0.8); color: white; outline: none; text-align: center; width: 100%; }
        .btn-main { background: var(--accent); color: var(--bg); font-weight: 900; cursor: pointer; border: none; font-size: 1.1rem; }
        .btn-main.editing { background: var(--fixed); }
        .btn-cancel-edit { background: rgba(239,68,68,0.15); color: var(--expense); border: 1px solid rgba(239,68,68,0.3); padding: 0 14px; border-radius: 14px; cursor: pointer; display: none; height: 55px; align-items: center; }
        .btn-cancel-edit.show { display: flex; }

        /* ===== LIST & FILTERS ===== */
        .filter-bar { display: flex; justify-content: center; gap: 6px; margin-bottom: 12px; }
        .filter-btn { background: var(--glass); border: 1px solid var(--glass-border); color: var(--text-dim); padding: 5px 12px; border-radius: 20px; cursor: pointer; font-size: 0.75rem; }
        .filter-btn.active { background: var(--accent); color: var(--bg); font-weight: 700; }
        .item { background: var(--glass); margin-bottom: 8px; display: flex; justify-content: space-between; padding: 12px; border-radius: 12px; border: 1px solid var(--glass-border); align-items: center; }
        .item.income { border-right: 4px solid var(--income); }
        .item.expense { border-right: 4px solid var(--expense); }
        .item.fixed { border-right: 4px solid var(--fixed); }
        .icon-btn { background: none; border: none; cursor: pointer; font-size: 1.1rem; padding: 4px; color: var(--text-dim); }

        /* ===== TOAST & MODAL ===== */
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 12px; z-index: 10000; transition: 0.4s; opacity: 0; font-weight: 700; color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #toast.show { top: 25px; opacity: 1; }
        .toast-success { background: var(--income); color: white; }
        .toast-warn { background: var(--expense); color: white; }
        .toast-info { background: var(--accent); color: var(--bg); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(5px); }
        .modal-overlay.open { display: flex; }
        .modal { background: #1e293b; padding: 20px; border-radius: 20px; width: 85%; max-width: 300px; text-align: center; border: 1px solid var(--glass-border); }

        .actions-bottom { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 15px; }
        .action-btn { background: var(--glass); border: 1px solid var(--glass-border); color: var(--text-dim); padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.75rem; }

        footer { text-align: center; padding: 20px; color: var(--text-dim); font-size: 0.65rem; }
    </style>
</head>
<body>

<div id="toast"></div>

<div class="modal-overlay" id="deleteModal">
    <div class="modal">
        <h3>🗑 למחוק פעולה זו?</h3>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button style="flex:1; padding:10px; border-radius:8px; background:var(--expense); color:white; border:none; font-weight:700; cursor:pointer;" onclick="confirmDeleteAction()">מחק</button>
            <button style="flex:1; padding:10px; border-radius:8px; background:rgba(255,255,255,0.1); color:var(--text); border:none; cursor:pointer;" onclick="closeModal('deleteModal')">ביטול</button>
        </div>
    </div>
</div>

<div class="container">
    <header>
        <div class="header-right">
            <div class="logo-container">
                <svg viewBox="0 0 24 24" width="32" height="32"><path class="shield-base" d="M12 2L4 5v6.09c0 5.05 3.41 9.76 8 10.91 4.59-1.15 8-5.86 8-10.91V5l-8-3z"/><rect class="data-bar" x="7" y="14" width="2.5" height="4" rx="1"/><rect class="data-bar" x="10.75" y="11" width="2.5" height="7" rx="1" style="animation-delay:0.2s"/><rect class="data-bar" x="14.5" y="8" width="2.5" height="10" rx="1" style="animation-delay:0.4s"/></svg>
            </div>
            <div>
                <h1>Manager<span>Money</span></h1>
                <div class="status-bar">
                    <span class="version-badge">v1.8.20 Cloud</span>
                    <div class="cloud-badge">
                        <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z"/></svg>
                        ענן מחובר
                    </div>
                </div>
            </div>
        </div>
        <div class="user-avatar"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg></div>
    </header>

    <div class="month-nav">
        <button class="nav-btn" onclick="changeMonth(-1)">&#9664;</button>
        <div style="text-align:center;">
            <h3 id="monthLabel" style="margin:0; font-size:1.1rem;"></h3>
            <button id="loadFixedBtn" class="load-fixed-btn" onclick="importFixedEntries()" style="display:none;">📅 טען קבועות</button>
        </div>
        <button class="nav-btn" onclick="changeMonth(1)">&#9654;</button>
    </div>

    <div class="summary-mini">
        <div class="mini-card"><i>💰</i><span>הכנסות</span><b id="sumIncome" style="color:var(--income)">₪0</b></div>
        <div class="mini-card"><i>💸</i><span>הוצאות</span><b id="sumExpense" style="color:var(--expense)">₪0</b></div>
        <div class="mini-card"><i>📅</i><span>קבוע</span><b id="sumFixed" style="color:var(--fixed)">₪0</b></div>
        <div class="mini-card" style="border:1px solid var(--balance)"><i>⚖️</i><span>יתרה</span><b id="sumBalance" style="color:var(--balance)">₪0</b></div>
    </div>

    <div class="chart-section"><div class="chart-container"><canvas id="budgetChart"></canvas></div></div>

    <div class="budget-progress-container">
        <div class="progress-label"><span>ניצול תקציב</span><span id="usagePercent">0%</span></div>
        <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
    </div>

    <div class="form-card" id="formCard">
        <div class="input-row-top">
            <select id="type"><option value="income">💰 הכנסה</option><option value="expense">💸 הוצאה</option><option value="fixed">📅 קבוע</option></select>
            <input type="number" id="amount" placeholder="סכום">
            <input type="text" id="desc" placeholder="תיאור">
        </div>
        <div class="input-row-bottom">
            <button class="btn-main" id="saveBtn" onclick="addEntry()">שמור</button>
            <div style="display:flex; gap:10px; width:100%;">
                <input type="date" id="entryDate">
                <button class="btn-cancel-edit" id="cancelEditBtn" onclick="cancelEdit()">✕</button>
            </div>
        </div>
    </div>

    <div class="filter-bar">
        <button class="filter-btn active" onclick="setFilter('all',this)">הכל</button>
        <button class="filter-btn" onclick="setFilter('income',this)">הכנסות</button>
        <button class="filter-btn" onclick="setFilter('expense',this)">הוצאות</button>
        <button class="filter-btn" onclick="setFilter('fixed',this)">קבועות</button>
    </div>

    <div id="list"></div>

    <div class="actions-bottom">
        <button class="action-btn" style="color:var(--accent); font-weight: 700;" onclick="pullFromCloud()">🔄 עדכון מהענן</button>
        <button class="action-btn" onclick="syncToCloud()">☁️ סנכרון כפוי</button>
        <button class="action-btn" onclick="exportJSON()">💾 גיבוי</button>
        <button class="action-btn" onclick="exportCSV()">📊 אקסל</button>
    </div>

    <footer>Manager-Money v1.8.20 | אלכסנדר זבודיסקר 2026</footer>
</div>

<script>
// --- אתחול Firebase ---
const firebaseConfig = {
  apiKey: "AIzaSyAZ2-EJjvIbDvtKLwKg3LObkIAs8sNhyjU",
  authDomain: "managermoney-49d0e.firebaseapp.com",
  projectId: "managermoney-49d0e",
  databaseURL: "https://managermoney-49d0e-default-rtdb.europe-west1.firebasedatabase.app",
  storageBucket: "managermoney-49d0e.firebasestorage.app",
  messagingSenderId: "289678997235",
  appId: "1:289678997235:web:0a58a5a7a36d38e1152986"
};

if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}
const db = firebase.database();
const dbRef = db.ref('users/alex/entries');

// --- משתני אפליקציה ---
const STORAGE_KEY = 'budget_alex_2026';
let entries = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
let viewDate = new Date();
let editId = null;
let currentFilter = 'all';
let myChart = null;
let pendingDeleteId = null;
const MONTHS = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

// --- פונקציות ליבה ---

function showToast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show toast-' + type;
    setTimeout(() => t.classList.remove('show'), 3000);
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// 1. סנכרון כפוי (שולח הכל לענן)
function syncToCloud() {
    if(entries.length === 0) { showToast('אין נתונים לסנכרון', 'warn'); return; }
    showToast('מסנכרן לענן...', 'info');
    
    const dataObj = {};
    entries.forEach(e => dataObj[e.id] = e);
    
    dbRef.set(dataObj)
        .then(() => showToast('סונכרן בהצלחה!', 'success'))
        .catch(err => showToast('שגיאה בסנכרון', 'warn'));
}

// 2. משיכה מהענן (מעדכן את המכשיר)
function pullFromCloud() {
    showToast('מושך נתונים...', 'info');
    dbRef.once('value').then((snapshot) => {
        const val = snapshot.val();
        if(val) {
            entries = Object.values(val);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
            render();
            showToast('נתונים עודכנו!', 'success');
        } else {
            showToast('לא נמצאו נתונים בענן', 'warn');
        }
    }).catch(() => showToast('שגיאת תקשורת', 'warn'));
}

// 3. טעינת קבועות (תיקון הלוגיקה)
function importFixedEntries() {
    const m = viewDate.getMonth(), y = viewDate.getFullYear();
    const allFixed = entries.filter(e => e.type === 'fixed');
    
    // רשימת תיאורים שכבר קיימים בחודש הנבחר
    const existDescs = entries.filter(e => {
        const d = new Date(e.date);
        return d.getMonth() === m && d.getFullYear() === y;
    }).map(e => e.desc);

    // סינון קבועות ייחודיות
    const uniqueFixed = allFixed.filter((v, i, a) => a.findIndex(t => t.desc === v.desc) === i);
    
    let added = 0;
    uniqueFixed.forEach(f => {
        if(!existDescs.includes(f.desc)) {
            const newId = Date.now() + Math.random();
            const newE = { 
                id: newId, 
                desc: f.desc, 
                amount: f.amount, 
                type: 'fixed', 
                date: new Date(y, m, 2).toISOString().split('T')[0] 
            };
            entries.push(newE);
            db.ref('users/alex/entries/' + newId).set(newE);
            added++;
        }
    });

    if(added > 0) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
        render();
        showToast(`נוספו ${added} פעולות`, 'success');
    } else {
        showToast('הקבועות כבר קיימות בחודש זה', 'info');
    }
}

function render() {
    const m = viewDate.getMonth(), y = viewDate.getFullYear();
    document.getElementById('monthLabel').textContent = MONTHS[m] + ' ' + y;
    document.getElementById('loadFixedBtn').style.display = entries.some(e => e.type === 'fixed') ? 'inline-block' : 'none';

    const me = entries.filter(e => {
        const d = new Date(e.date);
        return d.getMonth() === m && d.getFullYear() === y;
    });

    let inc = 0, exp = 0, fix = 0;
    me.forEach(e => {
        if(e.type === 'income') inc += e.amount;
        else if(e.type === 'expense') exp += e.amount;
        else fix += e.amount;
    });

    document.getElementById('sumIncome').textContent = '₪' + inc.toLocaleString();
    document.getElementById('sumExpense').textContent = '₪' + exp.toLocaleString();
    document.getElementById('sumFixed').textContent = '₪' + fix.toLocaleString();
    const bal = inc - (exp + fix);
    const balEl = document.getElementById('sumBalance');
    balEl.textContent = '₪' + Math.abs(bal).toLocaleString();
    balEl.style.color = bal >= 0 ? 'var(--balance)' : 'var(--expense)';

    const usage = inc > 0 ? Math.min(Math.round(((exp + fix) / inc) * 100), 100) : 0;
    document.getElementById('usagePercent').textContent = usage + '%';
    const fill = document.getElementById('progressFill');
    fill.style.width = usage + '%';
    fill.style.background = usage >= 90 ? 'var(--expense)' : usage >= 70 ? 'var(--fixed)' : 'var(--accent)';

    if(myChart) myChart.destroy();
    myChart = new Chart(document.getElementById('budgetChart'), {
        type: 'doughnut',
        data: {
            datasets: [{
                data: (inc||exp||fix) ? [inc, exp, fix] : [1],
                backgroundColor: (inc||exp||fix) ? ['#22c55e', '#ef4444', '#f59e0b'] : ['#1e293b'],
                borderWidth: 0
            }]
        },
        options: { cutout: '75%', plugins: { legend: { display: false } } }
    });
    renderList();
}

function renderList() {
    const m = viewDate.getMonth(), y = viewDate.getFullYear();
    const me = entries.filter(e => {
        const d = new Date(e.date);
        return d.getMonth() === m && d.getFullYear() === y;
    });
    const filtered = currentFilter === 'all' ? me : me.filter(x => x.type === currentFilter);
    const icons = {income:'💰', expense:'💸', fixed:'📅'};
    
    document.getElementById('list').innerHTML = filtered.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(e => `
        <div class="item ${e.type}">
            <div>
                <div style="font-size:0.65rem; color:var(--text-dim)">${new Date(e.date).toLocaleDateString('he-IL')}</div>
                <div style="font-weight:600">${icons[e.type]} ${e.desc}</div>
            </div>
            <div style="display:flex; align-items:center; gap:8px;">
                <b style="color:var(--${e.type})">₪${e.amount.toLocaleString()}</b>
                <button class="icon-btn" onclick="editEntry(${e.id})">✎</button>
                <button class="icon-btn" onclick="askDelete(${e.id})">🗑</button>
            </div>
        </div>
    `).join('') || '<div style="text-align:center;color:var(--text-dim);padding:20px;">אין פעולות</div>';
}

function addEntry() {
    const d = document.getElementById('desc').value, 
          a = parseFloat(document.getElementById('amount').value), 
          t = document.getElementById('type').value, 
          dt = document.getElementById('entryDate').value;
          
    if(!d || !a || !dt) { showToast('מלא את כל השדות', 'warn'); return; }

    let newE;
    if(editId) {
        const i = entries.findIndex(e => e.id === editId);
        entries[i] = { ...entries[i], desc: d, amount: a, type: t, date: dt };
        newE = entries[i];
        cancelEdit();
    } else {
        newE = { id: Date.now(), desc: d, amount: a, type: t, date: dt };
        entries.push(newE);
    }

    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    db.ref('users/alex/entries/' + newE.id).set(newE)
        .then(() => showToast('נשמר וסונכרן'))
        .catch(() => showToast('נשמר מקומית בלבד', 'info'));

    document.getElementById('desc').value = ''; 
    document.getElementById('amount').value = '';
    render();
}

function editEntry(id) {
    const e = entries.find(x => x.id === id);
    document.getElementById('desc').value = e.desc;
    document.getElementById('amount').value = e.amount;
    document.getElementById('type').value = e.type;
    document.getElementById('entryDate').value = e.date.split('T')[0];
    editId = id;
    document.getElementById('saveBtn').textContent = 'עדכן';
    document.getElementById('saveBtn').classList.add('editing');
    document.getElementById('cancelEditBtn').classList.add('show');
    document.getElementById('formCard').classList.add('edit-mode');
    window.scrollTo({top: 0, behavior: 'smooth'});
}

function cancelEdit() {
    editId = null;
    document.getElementById('saveBtn').textContent = 'שמור';
    document.getElementById('saveBtn').classList.remove('editing');
    document.getElementById('cancelEditBtn').classList.remove('show');
    document.getElementById('formCard').classList.remove('edit-mode');
    document.getElementById('desc').value = ''; document.getElementById('amount').value = '';
}

function askDelete(id) { pendingDeleteId = id; openModal('deleteModal'); }

function confirmDeleteAction() {
    db.ref('users/alex/entries/' + pendingDeleteId).remove();
    entries = entries.filter(e => e.id !== pendingDeleteId);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    closeModal('deleteModal');
    render();
    showToast('נמחק', 'warn');
}

function setFilter(type, btn) {
    currentFilter = type;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderList();
}

function changeMonth(n) { viewDate.setMonth(viewDate.getMonth() + n); render(); }

function exportJSON() {
    const blob = new Blob([JSON.stringify(entries, null, 2)], {type:'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'budget_backup.json'; a.click();
}

function exportCSV() {
    let csv = '\uFEFFתאריך,תיאור,סוג,סכום\n';
    entries.forEach(e => csv += `${e.date},${e.desc},${e.type},${e.amount}\n`);
    const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'report.csv'; a.click();
}

document.getElementById('entryDate').value = new Date().toISOString().split('T')[0];
render();
</script>
</body>
</html>
