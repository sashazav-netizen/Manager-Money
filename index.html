<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Manager-Money | אלכסנדר 2026</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050810;
            --glass: rgba(30, 41, 59, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --income: #34d399;
            --expense: #f87171;
            --fixed: #fbbf24;
            --balance: #22d3ee;
            --accent: #22d3ee;
            --edit: #f59e0b;
        }

        html, body { max-width: 100%; overflow-x: hidden; margin: 0; padding: 0; background: var(--bg); }
        * { box-sizing: border-box; font-family: 'Heebo', sans-serif; }
        
        body { 
            background: radial-gradient(circle at 20% 10%, #1e293b, #050810);
            background-attachment: fixed;
            color: var(--text); padding: 15px; direction: rtl; min-height: 100vh;
        }

        .container { max-width: 600px; margin: 0 auto; padding-bottom: 60px; }

        header { display: flex; align-items: center; justify-content: center; gap: 18px; margin: 30px 0; }
        
        .logo-container {
            width: 60px;
            height: 60px;
            position: relative;
            filter: drop-shadow(0 0 15px rgba(34, 211, 238, 0.4));
        }
        .shield-base { fill: rgba(34, 211, 238, 0.1); stroke: var(--accent); stroke-width: 1.2; }
        .data-bar { fill: var(--income); animation: pulseData 2s infinite ease-in-out; }
        @keyframes pulseData {
            0%, 100% { opacity: 0.6; transform: scaleY(1); }
            50% { opacity: 1; transform: scaleY(1.1); }
        }

        h1 { font-size: 2rem; font-weight: 900; margin: 0; letter-spacing: -1px; text-shadow: 0 0 20px rgba(255,255,255,0.1); }
        h1 span { color: var(--accent); }

        .month-nav { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 25px; background: var(--glass); padding: 10px; border-radius: 50px; border: 1px solid var(--glass-border); backdrop-filter: blur(10px); }
        .nav-btn { background: var(--accent); color: var(--bg); border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-weight: bold; transition: 0.2s; }

        .summary-mini { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .mini-card { background: var(--glass); backdrop-filter: blur(15px); padding: 14px 2px; border-radius: 18px; text-align: center; border: 1px solid var(--glass-border); }
        .mini-card span { display: block; font-size: 0.75rem; color: var(--text-dim); margin-bottom: 5px; }
        .mini-card b { font-size: 0.9rem; font-weight: 700; }
        .mini-card.highlight { border: 1px solid var(--balance); background: rgba(34, 211, 238, 0.05); }

        .budget-progress-container { background: var(--glass); padding: 15px; border-radius: 20px; margin-bottom: 25px; border: 1px solid var(--glass-border); }
        .progress-label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 10px; }
        .progress-bar { height: 10px; background: rgba(255,255,255,0.05); border-radius: 20px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--income)); transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }

        .chart-section { background: var(--glass); padding: 25px; border-radius: 24px; margin-bottom: 30px; border: 1px solid var(--glass-border); display: flex; flex-direction: column; align-items: center; }
        .chart-container { height: 140px; width: 140px; position: relative; }

        /* עיצוב שדות קלט מוקטנים ועדינים */
        .form-card { background: var(--glass); padding: 18px; border-radius: 22px; margin-bottom: 30px; border: 1px solid var(--glass-border); }
        .input-group { display: flex; flex-direction: column; gap: 10px; }
        .row-inputs { display: flex; gap: 8px; }
        
        input, select, .btn-main { 
            padding: 10px 14px; /* הקטנת ה-padding מ-14 ל-10 */
            border-radius: 12px; 
            border: 1px solid var(--glass-border); 
            background: rgba(15, 23, 42, 0.8); 
            color: white; 
            outline: none; 
            font-size: 0.95rem; /* הקטנת הפונט מ-1rem ל-0.95rem */
            width: 100%; 
        }
        
        input:focus { border-color: var(--accent); }
        
        .btn-main { 
            background: var(--accent); 
            color: var(--bg); 
            font-weight: 900; 
            cursor: pointer; 
            border: none; 
            margin-top: 4px;
            padding: 12px; /* כפתור נשאר מעט יותר גדול ללחיצה נוחה */
        }

        .filter-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .filter-btn { background: var(--glass); border: 1px solid var(--glass-border); color: var(--text-dim); padding: 8px 18px; border-radius: 25px; cursor: pointer; font-size: 0.85rem; }
        .filter-btn.active { background: var(--accent); color: var(--bg); font-weight: 800; }

        .item { background: var(--glass); margin-bottom: 12px; display: flex; justify-content: space-between; padding: 16px; border-radius: 16px; border: 1px solid var(--glass-border); align-items: center; animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        
        .item.income { border-right: 5px solid var(--income); }
        .item.expense { border-right: 5px solid var(--expense); }
        .item.fixed { border-right: 5px solid var(--fixed); }

        .actions-bottom { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 30px; }
        .action-btn { background: var(--glass); border: 1px solid var(--glass-border); color: var(--text-dim); padding: 10px 20px; border-radius: 14px; cursor: pointer; font-size: 0.85rem; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(8px); }
        .modal { background: #111827; padding: 30px; border-radius: 28px; width: 90%; max-width: 340px; text-align: center; border: 1px solid var(--glass-border); }

        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: var(--expense); color: white; padding: 14px 30px; border-radius: 50px; z-index: 10000; transition: 0.5s; font-weight: bold; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #toast.show { bottom: 50px; }
    </style>
</head>
<body>

<div id="toast">⚠️ נא למלא תיאור וסכום</div>

<div class="modal-overlay" id="deleteModal">
    <div class="modal">
        <h3>למחוק פעולה זו?</h3>
        <div style="display:flex; gap:12px; margin-top:25px;">
            <button onclick="confirmDeleteAction()" style="flex:1; padding:14px; border-radius:12px; background:var(--expense); color:white; border:none; font-weight:700;">מחק</button>
            <button onclick="closeModal('deleteModal')" style="flex:1; padding:14px; border-radius:12px; background:rgba(255,255,255,0.05); color:var(--text); border:none;">ביטול</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="refreshModal">
    <div class="modal">
        <div style="font-size: 3rem; margin-bottom: 15px;">🚀</div>
        <h3>גרסה v1.3.6 מוכנה</h3>
        <p style="color:var(--text-dim)">המערכת עודכנה למראה "מגן הנתונים הזוהר".</p>
        <button onclick="location.reload(true)" style="width:100%; padding:14px; border-radius:12px; background:var(--accent); color:var(--bg); border:none; font-weight:900; margin-top:15px;">רענן כעת</button>
    </div>
</div>

<div class="container">
    <header>
        <div class="logo-container">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--accent);stop-opacity:0.2" />
                        <stop offset="100%" style="stop-color:var(--accent);stop-opacity:0.05" />
                    </linearGradient>
                </defs>
                <path class="shield-base" d="M12 2L4 5v6.09c0 5.05 3.41 9.76 8 10.91 4.59-1.15 8-5.86 8-10.91V5l-8-3z" fill="url(#shieldGrad)" />
                <rect class="data-bar" x="8" y="14" width="1.5" height="3" rx="0.3" transform-origin="center bottom" />
                <rect class="data-bar" x="11.2" y="11" width="1.5" height="6" rx="0.3" style="animation-delay: 0.2s" />
                <rect class="data-bar" x="14.4" y="8" width="1.5" height="9" rx="0.3" style="animation-delay: 0.4s" />
            </svg>
        </div>
        <h1>Manager<span>Money</span></h1>
    </header>

    <div class="month-nav">
        <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
        <h3 id="monthLabel" style="margin:0; font-weight:900;"></h3>
        <button class="nav-btn" onclick="changeMonth(1)">▶</button>
    </div>

    <div class="summary-mini">
        <div class="mini-card"><span>הכנסות</span><b id="sumIncome" style="color:var(--income)">₪0</b></div>
        <div class="mini-card"><span>הוצאות</span><b id="sumExpense" style="color:var(--expense)">₪0</b></div>
        <div class="mini-card"><span>קבועות</span><b id="sumFixed" style="color:var(--fixed)">₪0</b></div>
        <div class="mini-card highlight"><span>יתרה</span><b id="sumBalance" style="color:var(--balance)">₪0</b></div>
    </div>

    <div class="budget-progress-container">
        <div class="progress-label"><span>ניצול תקציב חודשי</span><span id="usagePercent" style="font-weight:900;">0%</span></div>
        <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
    </div>

    <div class="chart-section">
        <div class="chart-container"><canvas id="budgetChart"></canvas></div>
    </div>

    <div class="form-card">
        <div class="input-group">
            <input type="text" id="desc" placeholder="תיאור הפעולה">
            <div class="row-inputs">
                <input type="number" id="amount" placeholder="סכום (₪)">
                <select id="type">
                    <option value="income">💰 הכנסה</option>
                    <option value="expense">💸 הוצאה</option>
                    <option value="fixed">📅 קבוע</option>
                </select>
            </div>
            <button class="btn-main" id="saveBtn" onclick="addEntry()">שמור פעולה</button>
        </div>
    </div>

    <div class="filter-bar">
        <button class="filter-btn active" onclick="setFilter('all', this)">הכל</button>
        <button class="filter-btn" onclick="setFilter('income', this)">הכנסות</button>
        <button class="filter-btn" onclick="setFilter('expense', this)">הוצאות</button>
    </div>

    <div id="list"></div>

    <div class="actions-bottom">
        <button class="action-btn" style="color:var(--accent); font-weight:bold" onclick="document.getElementById('refreshModal').style.display='flex'">🚀 גרסה</button>
        <button class="action-btn" onclick="exportJSON()">💾 גיבוי</button>
        <button class="action-btn" onclick="exportCSV()">📊 אקסל</button>
        <button class="action-btn" onclick="document.getElementById('importFile').click()">🔄 מיזוג</button>
        <input type="file" id="importFile" style="display:none" onchange="smartMerge(event)">
    </div>

    <footer style="text-align:center; padding: 30px; color: var(--text-dim); font-size: 0.75rem;">
        MANAGER-MONEY v1.3.6 | אלכסנדר זבודיסקר 2026
    </footer>
</div>

<script>
    let entries = JSON.parse(localStorage.getItem('budget_alex_2026')) || [];
    let viewDate = new Date();
    let editId = null;
    let pendingDeleteId = null;
    let currentFilter = 'all';
    let myChart = null;

    function showToast() {
        const t = document.getElementById('toast');
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    function openDeleteModal(id) { pendingDeleteId = id; document.getElementById('deleteModal').style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function confirmDeleteAction() { entries = entries.filter(e => e.id !== pendingDeleteId); save(); closeModal('deleteModal'); }

    function save() { localStorage.setItem('budget_alex_2026', JSON.stringify(entries)); render(); }
    function changeMonth(n) { viewDate.setMonth(viewDate.getMonth() + n); render(); }
    function setFilter(type, btn) { 
        currentFilter = type; 
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); render(); 
    }

    function addEntry() {
        const d = document.getElementById('desc'), a = document.getElementById('amount'), t = document.getElementById('type'), btn = document.getElementById('saveBtn');
        if(!d.value || !a.value) { showToast(); return; }
        if(editId) {
            const i = entries.findIndex(e => e.id === editId);
            if(i !== -1) entries[i] = {...entries[i], desc: d.value, amount: parseFloat(a.value), type: t.value};
            editId = null; btn.innerText = "שמור פעולה"; btn.style.background = "var(--accent)";
        } else {
            const isCurrentMonth = new Date().getMonth() === viewDate.getMonth() && new Date().getFullYear() === viewDate.getFullYear();
            const dateToSave = isCurrentMonth ? new Date().toISOString() : new Date(viewDate.getFullYear(), viewDate.getMonth(), 15).toISOString();
            entries.push({id: Date.now(), desc: d.value, amount: parseFloat(a.value), type: t.value, date: dateToSave});
        }
        d.value = ''; a.value = ''; save();
    }

    function editEntry(id) {
        const e = entries.find(x => x.id === id);
        if(!e) return;
        document.getElementById('desc').value = e.desc;
        document.getElementById('amount').value = e.amount;
        document.getElementById('type').value = e.type;
        editId = id; const btn = document.getElementById('saveBtn');
        btn.innerText = "עדכן שינויים"; btn.style.background = "var(--edit)";
        window.scrollTo({ top: 100, behavior: 'smooth' });
    }

    function render() {
        const mNames = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
        const m = viewDate.getMonth(), y = viewDate.getFullYear();
        document.getElementById('monthLabel').innerText = `${mNames[m]} ${y}`;
        const monthEntries = entries.filter(e => { const d = new Date(e.date); return d.getMonth() === m && d.getFullYear() === y; });
        let inc = 0, exp = 0, fix = 0;
        monthEntries.forEach(e => { if(e.type==='income') inc+=e.amount; else if(e.type==='expense') exp+=e.amount; else fix+=e.amount; });
        document.getElementById('sumIncome').innerText = `₪${inc.toLocaleString()}`;
        document.getElementById('sumExpense').innerText = `₪${exp.toLocaleString()}`;
        document.getElementById('sumFixed').innerText = `₪${fix.toLocaleString()}`;
        const bal = inc - (exp + fix);
        const balEl = document.getElementById('sumBalance');
        balEl.innerText = `₪${bal.toLocaleString()}`;
        balEl.style.color = bal >= 0 ? 'var(--balance)' : 'var(--expense)';
        const usage = inc > 0 ? Math.min(Math.round(((exp+fix) / inc) * 100), 100) : 0;
        document.getElementById('usagePercent').innerText = usage + '%';
        const fill = document.getElementById('progressFill');
        fill.style.width = usage + '%';
        fill.style.background = usage > 90 ? 'var(--expense)' : (usage > 75 ? 'var(--fixed)' : 'var(--income)');
        const filtered = currentFilter === 'all' ? monthEntries : monthEntries.filter(x => x.type === currentFilter);
        const icons = {income:'💰', expense:'💸', fixed:'📅'};
        let listHTML = '';
        filtered.sort((a,b) => b.id - a.id).forEach(e => {
            const d = new Date(e.date);
            listHTML += `<div class="item ${e.type}"><div class="item-info"><div style="font-weight:700;">${icons[e.type]} ${e.desc}</div><div style="font-size:0.7rem; color:var(--text-dim);">${d.getDate()}/${d.getMonth()+1}</div></div><div style="display:flex; align-items:center; gap:12px;"><b style="font-size:1.1rem;">₪${e.amount.toLocaleString()}</b><button onclick="editEntry(${e.id})" style="background:none; border:none; cursor:pointer;">✏️</button><button onclick="openDeleteModal(${e.id})" style="background:none; border:none; cursor:pointer;">🗑️</button></div></div>`;
        });
        document.getElementById('list').innerHTML = listHTML;
        updateChart(inc, exp, fix);
    }

    function updateChart(inc, exp, fix) {
        const ctx = document.getElementById('budgetChart').getContext('2d');
        const newData = (inc||exp||fix) ? [inc, exp, fix] : [1];
        const newColors = (inc||exp||fix) ? ['#34d399', '#f87171', '#fbbf24'] : ['#1e293b'];
        if (myChart) { myChart.data.datasets[0].data = newData; myChart.data.datasets[0].backgroundColor = newColors; myChart.update(); }
        else { myChart = new Chart(ctx, { type: 'doughnut', data: { labels: ['הכנסה', 'הוצאה', 'קבוע'], datasets: [{ data: newData, backgroundColor: newColors, borderWidth: 0 }] }, options: { cutout: '78%', plugins: { legend: { display: false } }, animation: { duration: 800 } } }); }
    }

    function exportJSON() {
        const blob = new Blob([JSON.stringify(entries)], {type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `money_manager_backup.json`; a.click();
    }
    
    function exportCSV() {
        let csv = "\uFEFFתאריך,תיאור,סוג,סכום\n";
        entries.forEach(e => csv += `${new Date(e.date).toLocaleDateString()},${e.desc},${e.type},${e.amount}\n`);
        const blob = new Blob([csv], {type:'text/csv'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'manager_money_export.csv'; a.click();
    }

    function smartMerge(ev) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                if (Array.isArray(data)) {
                    data.forEach(ne => { if(!entries.find(old => old.id === ne.id)) entries.push(ne); });
                    save(); 
                }
            } catch(err) { alert("שגיאה בפורמט."); }
        };
        reader.readAsText(ev.target.files[0]);
    }
    render();
</script>
</body>
</html>
