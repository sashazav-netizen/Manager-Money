<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Manager-Money | אלכסנדר 2026</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #070b14;
            --glass: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --income: #22c55e;
            --expense: #ef4444;
            --fixed: #f59e0b;
            --balance: #38bdf8;
            --accent: #38bdf8;
            --edit: #f59e0b;
        }

        html, body { max-width: 100%; overflow-x: hidden; margin: 0; padding: 0; background: var(--bg); }
        * { box-sizing: border-box; font-family: 'Heebo', sans-serif; }
        
        body { 
            background: radial-gradient(circle at top right, #1e293b, #070b14);
            background-attachment: fixed;
            color: var(--text); padding: 15px; direction: rtl; min-height: 100vh;
        }

        .container { max-width: 600px; margin: 0 auto; padding-bottom: 60px; }

        header { display: flex; align-items: center; justify-content: center; gap: 12px; margin: 20px 0; }
        .header-icon { width: 42px; height: 42px; filter: drop-shadow(0 0 8px var(--accent)); }
        .coin-svg { fill: var(--accent); animation: coinSpin 4s infinite linear; }
        @keyframes coinSpin { 0%, 100% { transform: rotateY(0deg); } 50% { transform: rotateY(180deg); } }

        h1 { font-size: 1.8rem; font-weight: 900; margin: 0; }
        h1 span { color: var(--accent); }

        .month-nav { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 20px; background: var(--glass); padding: 8px; border-radius: 50px; border: 1px solid var(--glass-border); }
        .nav-btn { background: var(--accent); color: var(--bg); border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-weight: bold; }

        .summary-mini { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .mini-card { background: var(--glass); backdrop-filter: blur(12px); padding: 12px 2px; border-radius: 14px; text-align: center; border: 1px solid var(--glass-border); }
        .mini-card span { display: block; font-size: 0.7rem; color: var(--text-dim); margin-bottom: 4px; }
        .mini-card b { font-size: 0.85rem; white-space: nowrap; }
        .mini-card highlight { border: 1px solid var(--balance); background: rgba(56, 189, 248, 0.1); }

        .budget-progress-container { background: var(--glass); padding: 12px; border-radius: 15px; margin-bottom: 20px; border: 1px solid var(--glass-border); }
        .progress-label { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 8px; }
        .progress-bar { height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: var(--accent); transition: width 0.6s ease; }

        .chart-section { background: var(--glass); padding: 20px; border-radius: 20px; margin-bottom: 25px; border: 1px solid var(--glass-border); display: flex; flex-direction: column; align-items: center; }
        .chart-container { height: 130px; width: 130px; position: relative; }

        .form-card { background: var(--glass); padding: 15px; border-radius: 18px; margin-bottom: 25px; border: 1px solid var(--glass-border); }
        .input-group { display: flex; gap: 8px; flex-wrap: wrap; }
        input, select, .btn-main { padding: 10px; border-radius: 10px; border: 1px solid var(--glass-border); background: rgba(15, 23, 42, 0.6); color: white; outline: none; font-size: 0.9rem; }
        input { flex: 2; min-width: 100px; }
        .btn-main { background: var(--accent); color: var(--bg); font-weight: 900; cursor: pointer; border: none; flex: 1; transition: 0.3s; }

        .filter-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .filter-btn { background: var(--glass); border: 1px solid var(--glass-border); color: var(--text-dim); padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; }
        .filter-btn.active { background: var(--accent); color: var(--bg); font-weight: 700; }

        #list { min-height: 50px; margin-bottom: 30px; }
        .item { background: var(--glass); margin-bottom: 10px; display: flex; justify-content: space-between; padding: 14px; border-radius: 12px; border: 1px solid var(--glass-border); align-items: center; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .item.income { border-right: 4px solid var(--income); }
        .item.expense { border-right: 4px solid var(--expense); }
        .item.fixed { border-right: 4px solid var(--fixed); }

        /* סגנון חדש לתאריך הקטן */
        .item-info { display: flex; flex-direction: column; gap: 2px; }
        .item-date { font-size: 0.65rem; color: var(--text-dim); opacity: 0.8; }

        .actions-bottom { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
        .action-btn { background: var(--glass); border: 1px solid var(--glass-border); color: var(--text-dim); padding: 8px 15px; border-radius: 10px; cursor: pointer; font-size: 0.8rem; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(5px); }
        .modal { background: #1e293b; padding: 25px; border-radius: 24px; width: 90%; max-width: 320px; text-align: center; border: 1px solid var(--glass-border); }
        
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--expense); color: white; padding: 12px 25px; border-radius: 12px; z-index: 10000; transition: 0.5s; opacity: 0; font-weight: bold; pointer-events: none; }
        #toast.show { top: 20px; opacity: 1; }
    </style>
</head>
<body>

<div id="toast">⚠️ חסרים נתונים</div>

<div class="modal-overlay" id="deleteModal">
    <div class="modal">
        <h3>למחוק פעולה זו?</h3>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="confirmDeleteAction()" style="flex:1; padding:12px; border-radius:10px; background:var(--expense); color:white; border:none; font-weight:700;">מחק</button>
            <button onclick="closeModal('deleteModal')" style="flex:1; padding:12px; border-radius:10px; background:var(--glass-border); color:var(--text); border:none;">ביטול</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="refreshModal">
    <div class="modal">
        <div style="font-size: 2rem; margin-bottom: 10px;">🔄</div>
        <h3>עדכון גרסה</h3>
        <p style="color:var(--text-dim)">הנתונים שמורים. הדף יתרענן כעת.</p>
        <button onclick="location.reload(true)" style="width:100%; padding:12px; border-radius:10px; background:var(--accent); color:var(--bg); border:none; font-weight:700;">רענן כעת</button>
    </div>
</div>

<div class="container">
    <header>
        <div class="header-icon">
            <svg viewBox="0 0 24 24" class="coin-svg" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
                <path d="M12 7v10M9 9h6M9 15h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </div>
        <h1>Manager<span>Money</span></h1>
    </header>

    <div class="month-nav">
        <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
        <h3 id="monthLabel" style="margin:0;"></h3>
        <button class="nav-btn" onclick="changeMonth(1)">▶</button>
    </div>

    <div class="summary-mini">
        <div class="mini-card"><span>הכנסות</span><b id="sumIncome" style="color:var(--income)">₪0</b></div>
        <div class="mini-card"><span>הוצאות</span><b id="sumExpense" style="color:var(--expense)">₪0</b></div>
        <div class="mini-card"><span>קבוע</span><b id="sumFixed" style="color:var(--fixed)">₪0</b></div>
        <div class="mini-card highlight"><span>יתרה</span><b id="sumBalance" style="color:var(--balance)">₪0</b></div>
    </div>

    <div class="budget-progress-container">
        <div class="progress-label"><span>ניצול תקציב חודשי</span><span id="usagePercent">0%</span></div>
        <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
    </div>

    <div class="chart-section">
        <div class="chart-container"><canvas id="budgetChart"></canvas></div>
    </div>

    <div class="form-card">
        <div class="input-group">
            <input type="text" id="desc" placeholder="תיאור">
            <input type="number" id="amount" placeholder="סכום">
            <select id="type">
                <option value="income">💰 הכנסה</option>
                <option value="expense">💸 הוצאה</option>
                <option value="fixed">📅 קבוע</option>
            </select>
            <button class="btn-main" id="saveBtn" onclick="addEntry()">שמור</button>
        </div>
    </div>

    <div class="filter-bar">
        <button class="filter-btn active" onclick="setFilter('all', this)">הכל</button>
        <button class="filter-btn" onclick="setFilter('income', this)">הכנסות</button>
        <button class="filter-btn" onclick="setFilter('expense', this)">הוצאות</button>
    </div>

    <div id="list"></div>

    <div class="actions-bottom">
        <button class="action-btn" style="color:var(--accent); font-weight:bold" onclick="document.getElementById('refreshModal').style.display='flex'">🔄 עדכון</button>
        <button class="action-btn" onclick="exportJSON()">💾 גיבוי</button>
        <button class="action-btn" onclick="exportCSV()">📊 אקסל</button>
        <button class="action-btn" onclick="document.getElementById('importFile').click()">🔄 מיזוג</button>
        <input type="file" id="importFile" style="display:none" onchange="smartMerge(event)">
    </div>

    <footer style="text-align:center; padding: 20px; color: var(--text-dim); font-size: 0.7rem;">
        Manager-Money v1.3.4 | אלכסנדר זבודיסקר 2026
    </footer>
</div>

<script>
    let entries = JSON.parse(localStorage.getItem('budget_alex_2026')) || [];
    let viewDate = new Date();
    let editId = null;
    let pendingDeleteId = null;
    let currentFilter = 'all';
    let myChart = null;

    function openDeleteModal(id) { pendingDeleteId = id; document.getElementById('deleteModal').style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function confirmDeleteAction() { entries = entries.filter(e => e.id !== pendingDeleteId); save(); closeModal('deleteModal'); }

    function save() { 
        localStorage.setItem('budget_alex_2026', JSON.stringify(entries)); 
        render(); 
    }

    function changeMonth(n) { viewDate.setMonth(viewDate.getMonth() + n); render(); }
    
    function setFilter(type, btn) { 
        currentFilter = type; 
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); 
        render(); 
    }

    function addEntry() {
        const d = document.getElementById('desc'), a = document.getElementById('amount'), t = document.getElementById('type'), btn = document.getElementById('saveBtn');
        if(!d.value || !a.value) {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
            return;
        }
        
        if(editId) {
            const i = entries.findIndex(e => e.id === editId);
            if(i !== -1) entries[i] = {...entries[i], desc: d.value, amount: parseFloat(a.value), type: t.value};
            editId = null; 
            btn.innerText = "שמור";
            btn.style.background = "var(--accent)";
        } else {
            const isCurrentMonth = new Date().getMonth() === viewDate.getMonth() && new Date().getFullYear() === viewDate.getFullYear();
            const dateToSave = isCurrentMonth ? new Date().toISOString() : new Date(viewDate.getFullYear(), viewDate.getMonth(), 15).toISOString();
            
            entries.push({
                id: Date.now(), 
                desc: d.value, 
                amount: parseFloat(a.value), 
                type: t.value, 
                date: dateToSave
            });
        }
        d.value = ''; a.value = ''; save();
    }

    function editEntry(id) {
        const e = entries.find(x => x.id === id);
        if(!e) return;
        document.getElementById('desc').value = e.desc;
        document.getElementById('amount').value = e.amount;
        document.getElementById('type').value = e.type;
        editId = id; 
        const btn = document.getElementById('saveBtn');
        btn.innerText = "עדכן";
        btn.style.background = "var(--edit)";
        window.scrollTo({ top: 100, behavior: 'smooth' });
    }

    function render() {
        const mNames = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
        const m = viewDate.getMonth(), y = viewDate.getFullYear();
        document.getElementById('monthLabel').innerText = `${mNames[m]} ${y}`;

        const monthEntries = entries.filter(e => {
            const d = new Date(e.date);
            return d.getMonth() === m && d.getFullYear() === y;
        });

        let inc = 0, exp = 0, fix = 0;
        monthEntries.forEach(e => {
            if(e.type==='income') inc+=e.amount; else if(e.type==='expense') exp+=e.amount; else fix+=e.amount;
        });

        document.getElementById('sumIncome').innerText = `₪${inc.toLocaleString()}`;
        document.getElementById('sumExpense').innerText = `₪${exp.toLocaleString()}`;
        document.getElementById('sumFixed').innerText = `₪${fix.toLocaleString()}`;
        const bal = inc - (exp + fix);
        const balEl = document.getElementById('sumBalance');
        balEl.innerText = `₪${bal.toLocaleString()}`;
        balEl.style.color = bal >= 0 ? 'var(--balance)' : 'var(--expense)';

        const usage = inc > 0 ? Math.min(Math.round(((exp+fix) / inc) * 100), 100) : 0;
        document.getElementById('usagePercent').innerText = usage + '%';
        const fill = document.getElementById('progressFill');
        fill.style.width = usage + '%';
        fill.style.background = usage > 90 ? 'var(--expense)' : (usage > 75 ? 'var(--fixed)' : 'var(--income)');

        const filtered = currentFilter === 'all' ? monthEntries : monthEntries.filter(x => x.type === currentFilter);
        const icons = {income:'💰', expense:'💸', fixed:'📅'};
        
        let listHTML = '';
        filtered.sort((a,b) => b.id - a.id).forEach(e => {
            const d = new Date(e.date);
            const dateStr = `${d.getDate()}/${d.getMonth() + 1}`;

            listHTML += `
                <div class="item ${e.type}">
                    <div class="item-info">
                        <div>${icons[e.type]} ${e.desc}</div>
                        <div class="item-date">${dateStr}</div>
                    </div>
                    <div style="display:flex; align-items:center; gap:12px;">
                        <b>₪${e.amount.toLocaleString()}</b>
                        <button onclick="editEntry(${e.id})" style="background:none; border:none; cursor:pointer; font-size:1.1rem;">✏️</button>
                        <button onclick="openDeleteModal(${e.id})" style="background:none; border:none; cursor:pointer; font-size:1.1rem;">🗑️</button>
                    </div>
                </div>`;
        });
        document.getElementById('list').innerHTML = listHTML;

        updateChart(inc, exp, fix);
    }

    function updateChart(inc, exp, fix) {
        const ctx = document.getElementById('budgetChart').getContext('2d');
        const newData = (inc||exp||fix) ? [inc, exp, fix] : [1];
        const newColors = (inc||exp||fix) ? ['#22c55e', '#ef4444', '#f59e0b'] : ['#1e293b'];

        if (myChart) {
            myChart.data.datasets[0].data = newData;
            myChart.data.datasets[0].backgroundColor = newColors;
            myChart.update();
        } else {
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['הכנסה', 'הוצאה', 'קבוע'],
                    datasets: [{ data: newData, backgroundColor: newColors, borderWidth: 0 }]
                },
                options: { 
                    cutout: '75%', 
                    plugins: { legend: { display: false } },
                    animation: { duration: 600 }
                }
            });
        }
    }

    function exportJSON() {
        const blob = new Blob([JSON.stringify(entries)], {type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); 
        a.download = `money_manager_backup_${new Date().toLocaleDateString()}.json`; a.click();
    }
    
    function exportCSV() {
        let csv = "\uFEFFתאריך,תיאור,סוג,סכום\n";
        entries.forEach(e => csv += `${new Date(e.date).toLocaleDateString()},${e.desc},${e.type},${e.amount}\n`);
        const blob = new Blob([csv], {type:'text/csv'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'manager_money_export.csv'; a.click();
    }

    function smartMerge(ev) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                if (Array.isArray(data)) {
                    data.forEach(ne => { if(!entries.find(old => old.id === ne.id)) entries.push(ne); });
                    save(); 
                    alert("המיזוג הושלם בהצלחה!");
                } else { throw new Error(); }
            } catch(err) { alert("שגיאה: הקובץ אינו בפורמט תקין של גיבוי."); }
        };
        reader.readAsText(ev.target.files[0]);
    }

    render();
</script>
</body>
</html>
