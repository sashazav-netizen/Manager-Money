<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manager-Money</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        :root {
            --bg: #070b14;
            --glass: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --income: #22c55e;
            --expense: #ef4444;
            --fixed: #f59e0b;
            --balance: #38bdf8;
            --accent: #38bdf8;
            --cloud: #10b981;
        }

        html, body { max-width: 100%; overflow-x: hidden; margin: 0; padding: 0; background: var(--bg); }
        * { box-sizing: border-box; font-family: 'Heebo', sans-serif; }

        body {
            background: radial-gradient(circle at top right, #1e293b, #070b14);
            background-attachment: fixed;
            color: var(--text); padding: 15px; direction: rtl; min-height: 100vh;
        }

        .container { max-width: 600px; margin: 0 auto; padding-bottom: 40px; }

        /* ===== HEADER & LOGO ===== */
        header { display: flex; align-items: center; justify-content: space-between; margin: 20px 0; padding: 0 10px; }
        .header-right { display: flex; align-items: center; gap: 12px; }

        .logo-container {
            width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;
            background: rgba(56,189,248,0.08); border-radius: 14px;
            box-shadow: 0 0 20px rgba(56,189,248,0.25); border: 1px solid var(--glass-border);
            position: relative; overflow: hidden;
        }
        
        .shield-base { fill: rgba(56,189,248,0.1); stroke: var(--accent); stroke-width: 1.5; }
        .data-bar { fill: var(--income); transform-origin: bottom; animation: barGrow 2s infinite ease-in-out; }
        @keyframes barGrow { 0%, 100% { transform: scaleY(0.6); } 50% { transform: scaleY(1); } }

        h1 { font-size: 1.65rem; font-weight: 900; margin: 0; letter-spacing: -1px; }
        h1 span { color: var(--accent); }

        .status-bar { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
        .version-badge { background: rgba(56,189,248,0.15); border: 1px solid rgba(56,189,248,0.3); color: var(--accent); font-size: 0.6rem; font-weight: 800; padding: 1px 8px; border-radius: 20px; }

        /* ===== MONTH NAV ===== */
        .month-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: var(--glass); padding: 10px 15px; border-radius: 50px; border: 1px solid var(--glass-border); }
        .nav-btn { background: var(--accent); color: var(--bg); border: none; width: 34px; height: 34px; border-radius: 50%; cursor: pointer; font-weight: bold; font-size: 1.1rem; }
        .load-fixed-btn { background: rgba(245,158,11,0.12); color: var(--fixed); border: 1px solid rgba(245,158,11,0.4); padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; cursor: pointer; font-weight: 800; margin-top: 4px; }

        /* ===== SUMMARY MINI ===== */
        .summary-mini { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .mini-card { background: var(--glass); backdrop-filter: blur(12px); padding: 12px 4px; border-radius: 14px; text-align: center; border: 1px solid var(--glass-border); display: flex; flex-direction: column; justify-content: center; min-height: 90px; }
        .mini-card span { font-size: 0.65rem; color: var(--text-dim); margin-bottom: 4px; }
        .mini-card b { font-size: 0.85rem; font-weight: 900; }

        /* ===== CHART ===== */
        .chart-section { background: var(--glass); padding: 15px; border-radius: 20px; margin-bottom: 20px; border: 1px solid var(--glass-border); display: flex; justify-content: center; }
        .chart-container { height: 110px; width: 110px; }

        /* ===== FORM ===== */
        .form-card { background: var(--glass); padding: 18px; border-radius: 22px; margin-bottom: 20px; border: 1px solid var(--glass-border); transition: 0.3s ease; }
        .form-card.edit-mode { border-color: var(--fixed); box-shadow: 0 0 15px rgba(245,158,11,0.2); }
        .input-row-top { display: grid; grid-template-columns: 1.2fr 1fr 1.2fr; gap: 10px; margin-bottom: 12px; }
        .input-row-bottom { display: grid; grid-template-columns: 1fr 2fr; gap: 10px; }
        input, select, .btn-main { height: 52px; border-radius: 14px; border: 1px solid var(--glass-border); background: rgba(15,23,42,0.85); color: white; text-align: center; width: 100%; outline: none; font-size: 0.95rem; }
        .btn-main { background: var(--accent); color: var(--bg); font-weight: 900; cursor: pointer; border: none; transition: 0.2s; }
        .btn-main.editing { background: var(--fixed); }
        
        .cancel-edit-btn { background: rgba(239, 68, 68, 0.15); color: var(--expense); border: 1px solid var(--expense); margin-top: 10px; height: 40px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: 700; display: none; }
        .edit-mode .cancel-edit-btn { display: block; }

        /* ===== LIST ===== */
        .item { background: var(--glass); margin-bottom: 8px; display: flex; justify-content: space-between; padding: 14px; border-radius: 14px; border: 1px solid var(--glass-border); align-items: center; }
        .item.income { border-right: 5px solid var(--income); }
        .item.expense { border-right: 5px solid var(--expense); }
        .item.fixed { border-right: 5px solid var(--fixed); }
        .icon-btn { background: none; border: none; cursor: pointer; font-size: 1.2rem; color: var(--text-dim); transition: 0.2s; }
        .icon-btn:hover { color: white; transform: scale(1.1); }

        /* ===== MODAL & TOAST ===== */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.88); display: none; justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(4px); }
        .modal-overlay.open { display: flex; }
        .modal { background: #1e293b; padding: 25px; border-radius: 22px; width: 85%; max-width: 320px; text-align: center; border: 1px solid var(--glass-border); }

        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); padding: 14px 28px; border-radius: 15px; z-index: 10000; transition: 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28); font-weight: 800; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #toast.show { top: 30px; }
        .toast-success { background: var(--income); color: white; }
        .toast-warn { background: var(--expense); color: white; }

        .actions-bottom { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 25px; }
        .action-btn { background: var(--glass); border: 1px solid var(--glass-border); color: var(--text-dim); padding: 10px 5px; border-radius: 12px; font-size: 0.75rem; font-weight: 700; cursor: pointer; }

        footer { text-align: center; padding: 40px 20px; color: var(--text-dim); font-size: 0.75rem; opacity: 0.8; }
    </style>
</head>
<body>

<div id="toast"></div>

<div class="modal-overlay" id="deleteModal">
    <div class="modal">
        <h3 style="margin-top:0; color:white;">מחיקת פעולה?</h3>
        <p style="color:var(--text-dim); font-size:0.9rem;">הנתונים ימחקו לצמיתות מהמכשיר ומהענן.</p>
        <div style="display:flex; gap:12px; margin-top:25px;">
            <button onclick="confirmDeleteAction()" style="flex:1; padding:14px; background:var(--expense); color:white; border:none; border-radius:12px; font-weight:900; cursor:pointer;">מחק</button>
            <button onclick="closeModal('deleteModal')" style="flex:1; padding:14px; background:rgba(255,255,255,0.1); color:white; border:none; border-radius:12px; cursor:pointer;">ביטול</button>
        </div>
    </div>
</div>

<div class="container">
    <header>
        <div class="header-right">
            <div class="logo-container">
                <svg viewBox="0 0 24 24" width="34" height="34">
                    <path class="shield-base" d="M12 2L4 5v6.09c0 5.05 3.41 9.76 8 10.91 4.59-1.15 8-5.86 8-10.91V5l-8-3z"/>
                    <rect class="data-bar" x="7" y="14" width="2.2" height="4" rx="1"/>
                    <rect class="data-bar" x="10.9" y="11" width="2.2" height="7" rx="1" style="animation-delay:0.3s"/>
                    <rect class="data-bar" x="14.8" y="8" width="2.2" height="10" rx="1" style="animation-delay:0.6s"/>
                </svg>
            </div>
            <div>
                <h1>Manager<span>Money</span></h1>
                <div class="status-bar">
                    <span class="version-badge">v1.9.3</span>
                    <span id="cloudStatus" style="color:var(--cloud); font-size:0.65rem; font-weight:800;">● ענן מחובר</span>
                </div>
            </div>
        </div>
    </header>

    <div class="month-nav">
        <button class="nav-btn" onclick="changeMonth(-1)">&#9664;</button>
        <div style="text-align:center;">
            <h3 id="monthLabel" style="margin:0;"></h3>
            <button class="load-fixed-btn" onclick="importFixedEntries()">📅 טען קבועות</button>
        </div>
        <button class="nav-btn" onclick="changeMonth(1)">&#9654;</button>
    </div>

    <div class="summary-mini">
        <div class="mini-card"><span>הכנסות</span><b id="sumIncome" style="color:var(--income)">₪0</b></div>
        <div class="mini-card"><span>הוצאות</span><b id="sumExpense" style="color:var(--expense)">₪0</b></div>
        <div class="mini-card"><span>קבועות</span><b id="sumFixed" style="color:var(--fixed)">₪0</b></div>
        <div class="mini-card"><span>יתרה</span><b id="sumBalance" style="color:var(--balance)">₪0</b></div>
    </div>

    <div class="chart-section"><div class="chart-container"><canvas id="budgetChart"></canvas></div></div>

    <div class="form-card" id="formCard">
        <div class="input-row-top">
            <select id="type"><option value="income">💰 הכנסה</option><option value="expense">💸 הוצאה</option><option value="fixed">📅 קבוע</option></select>
            <input type="number" id="amount" placeholder="סכום" inputmode="decimal">
            <input type="text" id="desc" placeholder="תיאור">
        </div>
        <div class="input-row-bottom">
            <button class="btn-main" id="saveBtn" onclick="addEntry()">שמור</button>
            <input type="date" id="entryDate">
        </div>
        <button class="cancel-edit-btn" onclick="cancelEdit()">ביטול עריכה</button>
    </div>

    <div id="list"></div>

    <div class="actions-bottom">
        <button class="action-btn" onclick="pullFromCloud()">🔄 רענן ענן</button>
        <button class="action-btn" onclick="syncToCloud()">☁️ סנכרון כפוי</button>
        <button class="action-btn" onclick="mergeData()">🧬 מיזוג</button>
        <button class="action-btn" onclick="exportCSV()">📊 אקסל</button>
        <button class="action-btn" onclick="exportJSON()">💾 גיבוי</button>
        <button class="action-btn" style="color:var(--expense)" onclick="clearLocal()">🗑 נקה מקומי</button>
    </div>

    <footer>כל הזכויות שמורות לאלכסנדר זבודיסקר 2026 ©</footer>
</div>

<script>
// --- Firebase Config ---
const firebaseConfig = {
    apiKey: "AIzaSyAZ2-EJjvIbDvtKLwKg3LObkIAs8sNhyjU",
    authDomain: "managermoney-49d0e.firebaseapp.com",
    projectId: "managermoney-49d0e",
    databaseURL: "https://managermoney-49d0e-default-rtdb.europe-west1.firebasedatabase.app",
    storageBucket: "managermoney-49d0e.firebasestorage.app",
    messagingSenderId: "289678997235",
    appId: "1:289678997235:web:0a58a5a7a36d38e1152986"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const dbRef = db.ref('users/alex/entries');

firebase.auth().signInAnonymously().then(() => pullFromCloud(true));

// --- Global Vars ---
const STORAGE_KEY = 'budget_alex_2026';
let entries = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
let viewDate = new Date();
let editId = null;
let pendingDeleteId = null;
let myChart = null;
const MONTHS = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

function showToast(m, t='success') {
    const el = document.getElementById('toast');
    el.textContent = m; el.className = 'show toast-' + t;
    setTimeout(() => el.classList.remove('show'), 3000);
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function render() {
    const m = viewDate.getMonth(), y = viewDate.getFullYear();
    document.getElementById('monthLabel').textContent = MONTHS[m] + ' ' + y;

    const currentEntries = entries.filter(e => {
        const d = new Date(e.date);
        return d.getMonth() === m && d.getFullYear() === y;
    });

    let inc = 0, exp = 0, fix = 0;
    const listEl = document.getElementById('list');
    listEl.innerHTML = '';

    currentEntries.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(e => {
        if(e.type === 'income') inc += e.amount;
        else if(e.type === 'expense') exp += e.amount;
        else fix += e.amount;

        listEl.innerHTML += `
            <div class="item ${e.type}">
                <div>
                    <div style="font-size:0.65rem; color:var(--text-dim)">${new Date(e.date).toLocaleDateString('he-IL')}</div>
                    <b style="font-size:0.95rem;">${e.desc}</b>
                </div>
                <div style="display:flex; align-items:center; gap:12px;">
                    <b style="color:var(--${e.type}); font-size:1rem;">₪${e.amount.toLocaleString()}</b>
                    <button class="icon-btn" onclick="editEntry(${e.id})">✎</button>
                    <button class="icon-btn" onclick="askDelete(${e.id})">🗑</button>
                </div>
            </div>`;
    });

    document.getElementById('sumIncome').textContent = '₪' + inc.toLocaleString();
    document.getElementById('sumExpense').textContent = '₪' + exp.toLocaleString();
    document.getElementById('sumFixed').textContent = '₪' + fix.toLocaleString();
    
    const balance = inc - (exp + fix);
    const balEl = document.getElementById('sumBalance');
    balEl.textContent = '₪' + Math.abs(balance).toLocaleString();
    balEl.style.color = balance >= 0 ? 'var(--balance)' : 'var(--expense)';

    if(myChart) myChart.destroy();
    myChart = new Chart(document.getElementById('budgetChart'), {
        type: 'doughnut',
        data: { datasets: [{ data: (inc||exp||fix) ? [inc, exp, fix] : [1], backgroundColor: ['#22c55e', '#ef4444', '#f59e0b'], borderWidth: 0 }] },
        options: { cutout: '82%', plugins: { legend: { display: false } } }
    });
}

function addEntry() {
    const desc = document.getElementById('desc').value;
    const amount = parseFloat(document.getElementById('amount').value);
    const type = document.getElementById('type').value;
    const date = document.getElementById('entryDate').value;

    if(!desc || isNaN(amount) || !date) { showToast('נא למלא את כל השדות', 'warn'); return; }

    if(editId) {
        const i = entries.findIndex(e => e.id === editId);
        entries[i] = { ...entries[i], desc, amount, type, date };
        dbRef.child(editId).set(entries[i]);
        cancelEdit();
    } else {
        const newEntry = { id: Date.now(), desc, amount, type, date };
        entries.push(newEntry);
        dbRef.child(newEntry.id).set(newEntry);
    }

    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    document.getElementById('desc').value = '';
    document.getElementById('amount').value = '';
    render();
    showToast('הנתונים נשמרו!');
}

function editEntry(id) {
    const e = entries.find(x => x.id === id);
    if(!e) return;
    
    document.getElementById('desc').value = e.desc;
    document.getElementById('amount').value = e.amount;
    document.getElementById('type').value = e.type;
    document.getElementById('entryDate').value = e.date;
    
    editId = id;
    document.getElementById('saveBtn').textContent = 'עדכן פעולה';
    document.getElementById('saveBtn').classList.add('editing');
    document.getElementById('formCard').classList.add('edit-mode');
    window.scrollTo({top: 0, behavior: 'smooth'});
}

function cancelEdit() {
    editId = null;
    document.getElementById('desc').value = '';
    document.getElementById('amount').value = '';
    document.getElementById('entryDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('saveBtn').textContent = 'שמור';
    document.getElementById('saveBtn').classList.remove('editing');
    document.getElementById('formCard').classList.remove('edit-mode');
}

function askDelete(id) {
    pendingDeleteId = id;
    openModal('deleteModal');
}

function confirmDeleteAction() {
    if(!pendingDeleteId) return;
    entries = entries.filter(e => e.id !== pendingDeleteId);
    dbRef.child(pendingDeleteId).remove();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    closeModal('deleteModal');
    render();
    showToast('הפעולה נמחקה', 'warn');
    pendingDeleteId = null;
}

function importFixedEntries() {
    const m = viewDate.getMonth(), y = viewDate.getFullYear();
    const allFixed = entries.filter(e => e.type === 'fixed');
    
    const existingInMonth = entries.filter(e => {
        const d = new Date(e.date);
        return d.getMonth() === m && d.getFullYear() === y;
    }).map(e => e.desc);

    const uniqueTemplates = [];
    const seen = new Set();
    allFixed.forEach(f => {
        if(!seen.has(f.desc)) { uniqueTemplates.push(f); seen.add(f.desc); }
    });

    let addedCount = 0;
    uniqueTemplates.forEach(f => {
        if(!existingInMonth.includes(f.desc)) {
            const newId = Date.now() + Math.floor(Math.random() * 1000);
            const newE = { 
                id: newId, 
                desc: f.desc, 
                amount: f.amount, 
                type: 'fixed', 
                date: new Date(y, m, 2).toISOString().split('T')[0] 
            };
            entries.push(newE);
            dbRef.child(newId).set(newE);
            addedCount++;
        }
    });

    if(addedCount > 0) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
        render(); showToast(`נוספו ${addedCount} קבועות לחודש זה`);
    } else {
        showToast('לא נמצאו קבועות חדשות להוספה', 'warn');
    }
}

// --- Sync Functions ---
function pullFromCloud(silent=false) {
    dbRef.once('value').then(snap => {
        if(snap.val()) {
            entries = Object.values(snap.val());
            localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
            render(); if(!silent) showToast('סונכרן בהצלחה מהענן');
        }
    });
}

function syncToCloud() {
    const data = {}; entries.forEach(e => data[e.id] = e);
    dbRef.set(data).then(() => showToast('הענן עודכן ידנית!'));
}

function mergeData() {
    dbRef.once('value').then(snap => {
        const cloud = snap.val() ? Object.values(snap.val()) : [];
        const localIds = entries.map(e => e.id);
        let count = 0;
        cloud.forEach(c => { if(!localIds.includes(c.id)) { entries.push(c); count++; } });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
        render(); showToast(`מוזגו ${count} פעולות חדשות`);
    });
}

function exportCSV() {
    let csv = '\uFEFFתאריך,תיאור,סוג,סכום\n';
    entries.forEach(e => csv += `${e.date},${e.desc},${e.type},${e.amount}\n`);
    const blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `report_${MONTHS[viewDate.getMonth()]}.csv`; a.click();
}

function exportJSON() {
    const blob = new Blob([JSON.stringify(entries)], {type:'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'backup_manager_money.json'; a.click();
}

function clearLocal() {
    if(confirm('למחוק את כל הנתונים מהמכשיר? (זה לא ימחק מהענן)')) {
        entries = [];
        localStorage.removeItem(STORAGE_KEY);
        render();
        showToast('המכשיר נקי', 'warn');
    }
}

function changeMonth(n) { viewDate.setMonth(viewDate.getMonth() + n); render(); }

// Initialize
document.getElementById('entryDate').value = new Date().toISOString().split('T')[0];
render();
</script>
</body>
</html>
